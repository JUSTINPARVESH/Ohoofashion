services:
  - type: web
    name: ohoo-fashion-backend
    env: node
    region: oregon
    plan: free
    build:
      dir: ./backend
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ohoo_fashion_db
          property: connectionString
      - key: DATABASE_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: ohoo_fashion_db
    plan: free
    region: oregon
    databaseName: ohoo_fashion
    user: ohoo_user
